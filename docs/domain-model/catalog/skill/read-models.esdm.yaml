apiVersion: schema.esdm.io/core/v1
kind: read-model
name: skill
scope:
  domain: sport
  boundedContext: sport
projections:
  - boundedContext: sport
    aggregate: skill
    event: skill-cataloged
    rule: "Project the skill when it is cataloged"
  - boundedContext: sport
    aggregate: skill
    event: source-recorded
    rule: "Add source reference to the skill"
  - boundedContext: sport
    aggregate: skill
    event: source-unrecorded
    rule: "Remove source reference from the skill"
  - boundedContext: sport
    aggregate: skill
    event: start-position-changed
    rule: "Update the start position of the skill"
  - boundedContext: sport
    aggregate: skill
    event: end-position-changed
    rule: "Update the end position of the skill"
schema: {}
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: transition
scope:
  domain: sport
  boundedContext: sport
projections:
  - boundedContext: sport
    aggregate: skill
    event: skill-cataloged
    rule: "Create transition entry for the new skill"
  - boundedContext: sport
    aggregate: skill
    event: start-position-changed
    rule: "Update transition with the new start position"
  - boundedContext: sport
    aggregate: skill
    event: end-position-changed
    rule: "Update transition with the new end position"
schema: {}
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: bibliography
scope:
  domain: sport
  boundedContext: sport
projections:
  - boundedContext: sport
    aggregate: skill
    event: source-recorded
    rule: "Add source to the skill's bibliography"
  - boundedContext: sport
    aggregate: skill
    event: source-unrecorded
    rule: "Remove source from the skill's bibliography"
schema: {}
