apiVersion: schema.esdm.io/core/v1
kind: aggregate
name: instrument
description: "sport equipment that instrumentally supports the athlete. A movendum the athlete controls and moves around (see Göhner)"
scope:
  domain: sport
  boundedContext: sport
identifiedBy:
  source: generated
  generator: uuid
invariants:
  - name: unique-slug
    rule: The slug for the instrument must be unique within the domain
  - name: no-archive-when-in-use
    rule: An instrument can only be archived when no sport references it via use-instrument
state:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: "Unique identifier"
    title:
      type: string
      description: "Name of the instrument"
    slug:
      type: string
      description: "URL-friendly unique identifier"
    description:
      type: string
      description: "Optional description"
  required:
    - id
    - title
    - slug
