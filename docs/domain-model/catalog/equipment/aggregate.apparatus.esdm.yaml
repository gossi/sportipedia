apiVersion: schema.esdm.io/core/v1
kind: aggregate
name: apparatus
description: "Immovable sport equipment. An athlete moves or interacts with an apparatus, but will never move it"
scope:
  domain: sport
  boundedContext: sport
identifiedBy:
  source: generated
  generator: uuid
invariants:
  - name: unique-slug
    rule: The slug for the apparatus must be unique within the domain
  - name: no-archive-when-in-use
    rule: An apparatus can only be archived when no sport references it via use-apparatus
state:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: "Unique identifier"
    title:
      type: string
      description: "Name of the apparatus"
    slug:
      type: string
      description: "URL-friendly unique identifier"
    description:
      type: string
      description: "Optional description"
  required:
    - id
    - title
    - slug
