apiVersion: schema.esdm.io/core/v1
kind: command
name: catalog-instrument
scope:
  domain: sport
  boundedContext: sport
  aggregate: instrument
data:
  type: object
  properties:
    title:
      type: string
      description: "Name of the instrument"
    slug:
      type: string
      description: "URL-friendly unique identifier"
    description:
      type: string
      description: "Optional description"
  required:
    - title
    - slug
publishes:
  - instrument-cataloged
actors:
  - user
