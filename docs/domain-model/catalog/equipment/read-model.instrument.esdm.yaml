apiVersion: schema.esdm.io/core/v1
kind: read-model
name: instrument
scope:
  domain: sport
  boundedContext: sport
projections:
  - boundedContext: sport
    aggregate: instrument
    event: instrument-cataloged
    rule: "Project the instrument when it is cataloged"
  - boundedContext: sport
    aggregate: instrument
    event: instrument-edited
    rule: "Update instrument details"
  - boundedContext: sport
    aggregate: instrument
    event: instrument-archived
    rule: "Delete the instrument"
schema:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: "Unique identifier"
    title:
      type: string
      description: "Name of the instrument"
    slug:
      type: string
      description: "URL-friendly unique identifier"
    description:
      type: string
      description: "Optional description"
  required:
    - id
    - title
    - slug
