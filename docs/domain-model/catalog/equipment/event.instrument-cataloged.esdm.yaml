apiVersion: schema.esdm.io/core/v1
kind: event
name: instrument-cataloged
scope:
  domain: sport
  boundedContext: sport
  aggregate: instrument
data:
  type: object
  properties:
    id:
      type: string
      format: uuid
      description: "Unique identifier"
    title:
      type: string
      description: "Name of the instrument"
    slug:
      type: string
      description: "URL-friendly unique identifier"
    description:
      type: string
      description: "Optional description"
  required:
    - id
    - title
    - slug
