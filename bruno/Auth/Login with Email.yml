http:
  method: POST
  url: "{{authUrl}}/sign-in/email"
  body:
    type: form-urlencoded
    data:
      - name: email
        value: test@example.com
      - name: password
        value: Test123!

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
