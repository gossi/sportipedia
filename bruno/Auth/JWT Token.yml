info:
  name: JWT Token
  type: http
  seq: 4

http:
  method: GET
  url: "{{authUrl}}/token"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("apiToken", data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
