info:
  name: Catalog Instrument
  type: http
  seq: 1

http:
  method: POST
  url: "{{apiUrl}}/catalog/equipment/instruments/catalog-instrument"
  body:
    type: json
    data: |-
      {
        "data": {
          "type": "instrument",
          "attributes": {
            "title": "Skateboard",
            "slug": "skateboard"
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

